name: Build

on:
  push:
    tags: ["v*"]

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build (macOS ${{ matrix.arch }})
        run: wails build -platform darwin/${{ matrix.arch }} -o GONEXUM -ldflags "-X main.AppVersion=${{ github.ref_name }}"
        env:
          CGO_ENABLED: "1"

      - name: Package .app as zip
        run: |
          cd build/bin
          zip -r GONEXUM-${{ github.ref_name }}-macos-${{ matrix.arch }}.zip GONEXUM.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GONEXUM-macos-${{ matrix.arch }}
          path: build/bin/GONEXUM-${{ github.ref_name }}-macos-${{ matrix.arch }}.zip

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build (Windows amd64)
        run: wails build -platform windows/amd64 -o GONEXUM.exe -ldflags "-X main.AppVersion=${{ github.ref_name }}"
        env:
          CGO_ENABLED: "1"

      - name: Rename exe with version
        shell: pwsh
        run: Copy-Item build/bin/GONEXUM.exe "build/bin/GONEXUM-${{ github.ref_name }}-windows-amd64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GONEXUM-windows-amd64
          path: build/bin/GONEXUM-${{ github.ref_name }}-windows-amd64.exe

  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build (Linux amd64)
        run: wails build -platform linux/amd64 -o GONEXUM -ldflags "-X main.AppVersion=${{ github.ref_name }}"
        env:
          CGO_ENABLED: "1"

      - name: Package as tar.gz
        run: |
          cd build/bin
          tar -czf GONEXUM-${{ github.ref_name }}-linux-amd64.tar.gz GONEXUM

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GONEXUM-linux-amd64
          path: build/bin/GONEXUM-${{ github.ref_name }}-linux-amd64.tar.gz

  build-cli:
    name: Build CLI (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build CLI (${{ matrix.suffix }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-X main.AppVersion=${{ github.ref_name }}" \
            -o gonexum-cli-${{ github.ref_name }}-${{ matrix.suffix }} \
            ./cmd/gonexum-cli/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gonexum-cli-${{ matrix.suffix }}
          path: gonexum-cli-${{ github.ref_name }}-${{ matrix.suffix }}

  build-web:
    name: Build Web (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build Web (${{ matrix.suffix }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-X main.AppVersion=${{ github.ref_name }}" \
            -o gonexum-web-${{ github.ref_name }}-${{ matrix.suffix }} \
            ./cmd/gonexum-web/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gonexum-web-${{ matrix.suffix }}
          path: gonexum-web-${{ github.ref_name }}-${{ matrix.suffix }}

  release:
    name: Publish Release
    needs: [build-macos, build-windows, build-linux, build-cli, build-web]
    outputs:
      tag: ${{ github.ref_name }}
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release on public repo
        uses: softprops/action-gh-release@v2
        with:
          repository: diabolino/gonexum-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/GONEXUM-macos-amd64/GONEXUM-${{ github.ref_name }}-macos-amd64.zip
            dist/GONEXUM-macos-arm64/GONEXUM-${{ github.ref_name }}-macos-arm64.zip
            dist/GONEXUM-windows-amd64/GONEXUM-${{ github.ref_name }}-windows-amd64.exe
            dist/GONEXUM-linux-amd64/GONEXUM-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/gonexum-cli-linux-amd64/gonexum-cli-${{ github.ref_name }}-linux-amd64
            dist/gonexum-cli-linux-arm64/gonexum-cli-${{ github.ref_name }}-linux-arm64
            dist/gonexum-web-linux-amd64/gonexum-web-${{ github.ref_name }}-linux-amd64
            dist/gonexum-web-linux-arm64/gonexum-web-${{ github.ref_name }}-linux-arm64
          generate_release_notes: false
          body: |
            ## GONEXUM ${{ github.ref_name }}

            ### Application desktop

            | Plateforme | Fichier |
            |---|---|
            | macOS Apple Silicon (M1→M5) | `GONEXUM-${{ github.ref_name }}-macos-arm64.zip` |
            | macOS Intel | `GONEXUM-${{ github.ref_name }}-macos-amd64.zip` |
            | Windows 64-bit | `GONEXUM-${{ github.ref_name }}-windows-amd64.exe` |
            | Linux 64-bit | `GONEXUM-${{ github.ref_name }}-linux-amd64.tar.gz` |

            ### Web (seedbox / serveur dédié)

            Serveur web avec interface navigateur. Accessible depuis n'importe quel appareil sur le réseau.
            Nécessite `mediainfo` (et optionnellement `ffprobe`) installé sur le serveur.

            | Plateforme | Fichier |
            |---|---|
            | Linux 64-bit (amd64) | `gonexum-web-${{ github.ref_name }}-linux-amd64` |
            | Linux ARM64 (Raspberry Pi, etc.) | `gonexum-web-${{ github.ref_name }}-linux-arm64` |

            **Installation rapide :**
            ```bash
            chmod +x gonexum-web-${{ github.ref_name }}-linux-amd64
            sudo mv gonexum-web-${{ github.ref_name }}-linux-amd64 /usr/local/bin/gonexum-web
            gonexum-web --host 0.0.0.0 --port 8080
            # Puis ouvrir http://votreserveur:8080 dans le navigateur
            ```

            ### CLI (seedbox / serveur dédié)

            Binaire standalone, sans interface graphique. Idéal pour une utilisation sur seedbox ou serveur.
            Nécessite `mediainfo` (et optionnellement `ffprobe`) installé sur le serveur.

            | Plateforme | Fichier |
            |---|---|
            | Linux 64-bit (amd64) | `gonexum-cli-${{ github.ref_name }}-linux-amd64` |
            | Linux ARM64 (Raspberry Pi, etc.) | `gonexum-cli-${{ github.ref_name }}-linux-arm64` |

            **Installation rapide :**
            ```bash
            chmod +x gonexum-cli-${{ github.ref_name }}-linux-amd64
            sudo mv gonexum-cli-${{ github.ref_name }}-linux-amd64 /usr/local/bin/gonexum-cli
            gonexum-cli --help
            ```

            ---

            ### Premier lancement

            > L'application n'est pas signée. Suivez les instructions ci-dessous selon votre système.

            **macOS**
            1. Décompressez le `.zip`
            2. Faites un **clic droit** sur `GONEXUM.app` → **Ouvrir**
            3. Cliquez sur **Ouvrir** dans la fenêtre d'avertissement
            4. Lors des lancements suivants, double-clic suffit

            > Si macOS affiche "application endommagée" et refuse d'ouvrir :
            > - Allez dans **Réglages Système** → **Confidentialité et sécurité**
            > - Faites défiler jusqu'à la section **Sécurité** et cliquez sur **Ouvrir quand même**
            >
            > Ou via le Terminal :
            > ```
            > xattr -cr /chemin/vers/GONEXUM.app
            > ```

            **Windows**
            1. Double-cliquez sur le `.exe`
            2. Cliquez sur **Informations complémentaires** dans l'avertissement SmartScreen
            3. Cliquez sur **Exécuter quand même**

  virustotal:
    name: VirusTotal Scan
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload files to VirusTotal
        id: vt
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          upload_vt() {
            local file="$1"
            local label="$2"
            local size
            size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
            local upload_url="https://www.virustotal.com/api/v3/files"

            # Files > 32 MB require a special large-file upload URL
            if [ "$size" -gt 33554432 ]; then
              upload_url=$(curl -s --request GET \
                --url https://www.virustotal.com/api/v3/files/upload_url \
                --header "x-apikey: $VT_API_KEY" | jq -r '.data // empty')
              if [ -z "$upload_url" ]; then
                echo "${label}=" >> "$GITHUB_OUTPUT"
                return
              fi
            fi

            local response
            response=$(curl -s --request POST \
              --url "$upload_url" \
              --header "x-apikey: $VT_API_KEY" \
              --form "file=@${file}")

            local id sha256
            id=$(echo "$response" | jq -r '.data.id // empty')
            if [ -n "$id" ]; then
              # Récupère le SHA256 depuis le rapport pour construire une URL stable
              # qui ne redirige pas vers un fichier tiers en cas de déduplication VT
              sleep 5
              sha256=$(curl -s --request GET \
                --url "https://www.virustotal.com/api/v3/analyses/${id}" \
                --header "x-apikey: $VT_API_KEY" | jq -r '.meta.file_info.sha256 // empty')
              if [ -n "$sha256" ]; then
                echo "${label}=https://www.virustotal.com/gui/file/${sha256}" >> "$GITHUB_OUTPUT"
              else
                echo "${label}=https://www.virustotal.com/gui/file-analysis/${id}" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "VT upload failed for $label: $response" >&2
              echo "${label}=" >> "$GITHUB_OUTPUT"
            fi

            # Free tier: 4 requests/min → wait 16 s between uploads
            sleep 16
          }

          upload_vt "dist/GONEXUM-macos-amd64/GONEXUM-${TAG}-macos-amd64.zip"                  "macos_amd64"
          upload_vt "dist/GONEXUM-macos-arm64/GONEXUM-${TAG}-macos-arm64.zip"                  "macos_arm64"
          upload_vt "dist/GONEXUM-windows-amd64/GONEXUM-${TAG}-windows-amd64.exe"              "windows_amd64"
          upload_vt "dist/GONEXUM-linux-amd64/GONEXUM-${TAG}-linux-amd64.tar.gz"               "linux_amd64"
          upload_vt "dist/gonexum-cli-linux-amd64/gonexum-cli-${TAG}-linux-amd64"              "cli_linux_amd64"
          upload_vt "dist/gonexum-cli-linux-arm64/gonexum-cli-${TAG}-linux-arm64"              "cli_linux_arm64"
          upload_vt "dist/gonexum-web-linux-amd64/gonexum-web-${TAG}-linux-amd64"              "web_linux_amd64"
          upload_vt "dist/gonexum-web-linux-arm64/gonexum-web-${TAG}-linux-arm64"              "web_linux_arm64"

      - name: Append VirusTotal section to release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          TAG: ${{ github.ref_name }}
          VT_MACOS_ARM64:     ${{ steps.vt.outputs.macos_arm64 }}
          VT_MACOS_AMD64:     ${{ steps.vt.outputs.macos_amd64 }}
          VT_WINDOWS:         ${{ steps.vt.outputs.windows_amd64 }}
          VT_LINUX:           ${{ steps.vt.outputs.linux_amd64 }}
          VT_CLI_LINUX_AMD64: ${{ steps.vt.outputs.cli_linux_amd64 }}
          VT_CLI_LINUX_ARM64: ${{ steps.vt.outputs.cli_linux_arm64 }}
          VT_WEB_LINUX_AMD64: ${{ steps.vt.outputs.web_linux_amd64 }}
          VT_WEB_LINUX_ARM64: ${{ steps.vt.outputs.web_linux_arm64 }}
        run: |
          vt_row() {
            local label="$1" url="$2"
            if [ -n "$url" ]; then
              echo "| $label | [Voir le rapport]($url) |"
            else
              echo "| $label | _(non disponible)_ |"
            fi
          }

          current=$(gh release view "$TAG" --repo diabolino/gonexum-releases --json body -q .body)

          {
            printf '%s\n' "$current"
            echo ""
            echo "---"
            echo ""
            echo "### VirusTotal"
            echo ""
            echo "| Fichier | Rapport |"
            echo "|---|---|"
            vt_row "macOS Apple Silicon (arm64)" "$VT_MACOS_ARM64"
            vt_row "macOS Intel (amd64)"         "$VT_MACOS_AMD64"
            vt_row "Windows 64-bit"              "$VT_WINDOWS"
            vt_row "Linux 64-bit"                "$VT_LINUX"
            vt_row "CLI Linux amd64"             "$VT_CLI_LINUX_AMD64"
            vt_row "CLI Linux arm64"             "$VT_CLI_LINUX_ARM64"
            vt_row "Web Linux amd64"             "$VT_WEB_LINUX_AMD64"
            vt_row "Web Linux arm64"             "$VT_WEB_LINUX_ARM64"
          } > /tmp/full_body.md

          gh release edit "$TAG" --repo diabolino/gonexum-releases --notes-file /tmp/full_body.md
