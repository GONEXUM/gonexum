name: Build

on:
  push:
    tags: ["v*"]

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build (macOS ${{ matrix.arch }})
        run: wails build -platform darwin/${{ matrix.arch }} -o GONEXUM
        env:
          CGO_ENABLED: "1"

      - name: Package .app as zip
        run: |
          cd build/bin
          zip -r GONEXUM-macos-${{ matrix.arch }}.zip GONEXUM.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GONEXUM-macos-${{ matrix.arch }}
          path: build/bin/GONEXUM-macos-${{ matrix.arch }}.zip

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build (Windows amd64)
        run: wails build -platform windows/amd64 -o GONEXUM.exe
        env:
          CGO_ENABLED: "1"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GONEXUM-windows-amd64
          path: build/bin/GONEXUM.exe

  release:
    name: Publish Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release on public repo
        uses: softprops/action-gh-release@v2
        with:
          repository: diabolino/gonexum-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/GONEXUM-macos-amd64/GONEXUM-macos-amd64.zip
            dist/GONEXUM-macos-arm64/GONEXUM-macos-arm64.zip
            dist/GONEXUM-windows-amd64/GONEXUM.exe
          generate_release_notes: false
          body: |
            ## GONEXUM ${{ github.ref_name }}

            ### Téléchargement

            | Plateforme | Fichier |
            |---|---|
            | macOS Apple Silicon (M1->M5) | `GONEXUM-macos-arm64.zip` |
            | macOS Intel | `GONEXUM-macos-amd64.zip` |
            | Windows 64-bit | `GONEXUM.exe` |
