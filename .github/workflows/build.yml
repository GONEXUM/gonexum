name: Build

on:
  push:
    tags: ["v*"]

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Download ffprobe (macOS ${{ matrix.arch }})
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            curl -L "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o ffprobe.zip
          else
            curl -L "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o ffprobe.zip
          fi
          unzip -o ffprobe.zip
          chmod +x ffprobe

      - name: Build (macOS ${{ matrix.arch }})
        run: wails build -platform darwin/${{ matrix.arch }} -o GONEXUM
        env:
          CGO_ENABLED: "1"

      - name: Package .app + ffprobe as zip
        run: |
          cp ffprobe build/bin/ffprobe
          cd build/bin
          zip -r GONEXUM-macos-${{ matrix.arch }}.zip GONEXUM.app ffprobe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GONEXUM-macos-${{ matrix.arch }}
          path: build/bin/GONEXUM-macos-${{ matrix.arch }}.zip

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Download ffprobe (Windows)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          Copy-Item (Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1).FullName -Destination ffprobe.exe

      - name: Build (Windows amd64)
        run: wails build -platform windows/amd64 -o GONEXUM.exe
        env:
          CGO_ENABLED: "1"

      - name: Bundle ffprobe alongside exe
        shell: pwsh
        run: |
          Copy-Item ffprobe.exe build/bin/ffprobe.exe

      - name: Package as zip
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/GONEXUM.exe, build/bin/ffprobe.exe -DestinationPath build/bin/GONEXUM-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GONEXUM-windows-amd64
          path: build/bin/GONEXUM-windows-amd64.zip

  release:
    name: Publish Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release on public repo
        uses: softprops/action-gh-release@v2
        with:
          repository: diabolino/gonexum-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/GONEXUM-macos-amd64/GONEXUM-macos-amd64.zip
            dist/GONEXUM-macos-arm64/GONEXUM-macos-arm64.zip
            dist/GONEXUM-windows-amd64/GONEXUM-windows-amd64.zip
          generate_release_notes: false
          body: |
            ## GONEXUM ${{ github.ref_name }}

            ### Téléchargement

            | Plateforme | Fichier |
            |---|---|
            | macOS Apple Silicon (M1->M5) | `GONEXUM-macos-arm64.zip` |
            | macOS Intel | `GONEXUM-macos-amd64.zip` |
            | Windows 64-bit | `GONEXUM-windows-amd64.zip` |

            > ffprobe est inclus dans chaque archive — aucune installation requise.
